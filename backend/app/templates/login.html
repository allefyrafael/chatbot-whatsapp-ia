{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<h1>Login</h1>
<form method="post" action="/login">
    <label>E-mail
        <input type="email" name="email" required autofocus>
    </label>
    <label>Senha
        <input type="password" name="senha" required>
    </label>
    <button type="submit" class="btn btn-primary">Entrar</button>
</form>
{% endblock %}
