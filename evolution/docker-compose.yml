# Evolution API — gateway do WhatsApp (não oficial, via Baileys por baixo) com REST + QR Code.
# Sobe 3 serviços: a API, um Postgres (dados) e um Redis (cache).
# A aplicação Python fala com a Evolution por HTTP (EvolutionWhatsAppProvider).
services:
  evolution-api:
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-chatbot-evo-key-2026}
      # Banco (Postgres) — a Evolution roda as migrações no primeiro boot.
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@evo-postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      # Cache (Redis)
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evo-redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_LOCAL_ENABLED: "false"
      # Webhook é configurado por instância pela nossa aplicação (não global).
      WEBHOOK_GLOBAL_ENABLED: "false"
      LOG_LEVEL: ERROR
      DEL_INSTANCE: "false"
    depends_on:
      - evo-postgres
      - evo-redis
    volumes:
      - evolution_instances:/evolution/instances

  evo-postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_pg:/var/lib/postgresql/data

  evo-redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  evolution_instances:
  evolution_pg:
